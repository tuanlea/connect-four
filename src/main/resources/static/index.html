<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Connect Four</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="neon-text">Connect <span class="neon-text-alt">Four</span></h1>
            <div id="status" class="status glass">Connecting to server...</div>
        </header>

        <main>
            <div id="game-board" class="board glass">
                <!-- Board columns will be generated by JS -->
            </div>
            
            <div class="controls">
                <button id="join-btn" class="neon-btn">Join Game</button>
                <button id="reset-btn" class="neon-btn reset">Reset Game</button>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
